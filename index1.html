<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kapanga Land Surveys & Consultants - Expert land surveying services in Kenya including cadastral, title, topographical, and engineering surveys.">
<title>Home - Kapanga Land Surveys & Consultants</title>
<link rel="stylesheet" href="index.css">
</head>
<!-- Body begins here -->
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">
        <img src="icon.png" alt="Kapanga Land surveys logo">
        <h2>KAPANGA LAND SURVEYS & CONSULTANTS.</h2>
    </div>

    <div class="header-img"></div>
</header>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <a href="#"  class="active">Home</a>
        <a href="About Us.html">About Us</a>
        <a href="services.html">Services</a>
        <a href="proposals.html">Proposal Requests</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- CONTENT -->
    <section class="content">
        <div class="overlay">
            <h1>Welcome</h1>
            <p>
                Welcome to Kapanga Land Survey & Consultants.<br> 
                We provide professional land surveying, mapping, and geospatial consulting services.
            </p>
            <button>Learn More</button>
        </div>
    </section>

</div>



 <button class="btn" onclick="welcomeMessage()">Learn More</button>

 </div>

  </div>

</section>


<script>

/* SIMPLE INTERACTION */

function welcomeMessage(){
alert("Welcome to Kapanga Land Survey & Consultants!");
}
const images = [
    "cadastaral survey.png",
    "engineering survey 2.png",
    "Engineering survey.png",
    "mutation survey.png",
    "topographical.png"
];

let index = 0;
const content = document.querySelector(".content");

function changeBackground() {
    content.style.backgroundImage = `url('${images[index]}')`;

    index++;
    if (index >= images.length) {
        index = 0;
    }
}

changeBackground();
setInterval(changeBackground, 4000);
const aboutPage = document.querySelector('.about-page');

if (aboutPage) {
    const elements = aboutPage.querySelectorAll('.fade-in');

    function revealOnScroll() {
        const triggerBottom = window.innerHeight * 0.85;

        elements.forEach(el => {
            const boxTop = el.getBoundingClientRect().top;

            if (boxTop < triggerBottom) {
                el.classList.add('show');
            }
        });
    }

    window.addEventListener('scroll', revealOnScroll);
    revealOnScroll();
}
</script>

</body>
</html>
